<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <!-- Bootstrap CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />
</head>
<body>

  <!-- HEADER / NAVBAR -->
  <nav class="navbar navbar-expand-md navbar-dark bg-dark p-3 mb-4">
    <div class="container">
      <h1 class="m-0 fs-1 mb-0 lead">
        <a href="{{ '/index.html' | relative_url }}" class="navbar-brand text-decoration-none text-light fs-1">
          Chenmu Zhang
        </a>
      </h1>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="{{ '/index.html#R1' | relative_url }}" class="nav-link fs-5 text-light">
              Research
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ '/publications.html' | relative_url }}" class="nav-link fs-5 text-light">
              Publications
            </a>
          </li>
          <li class="nav-item">
            <a href="{{ '/bio.html' | relative_url }}" class="nav-link fs-5 text-light">
              Bio
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  {{ content }}

  <!-- FOOTER -->
  <footer class="bg-light text-center py-3">
    <p class="m-0">&copy; {{ site.time | date: '%Y' }} Powered by Chenmu</p>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>
  <script src="{{ '/script.js' | relative_url }}"></script>
</body>
</html>
